<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Note</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 750px; margin: 40px auto; padding: 0 20px; color: #222; }
    h2 { margin-top: 0; }
    textarea { width: 100%; height: 350px; padding: 15px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; line-height: 1.5; font-family: inherit; }
  </style>
</head>
<body>
  <h2>Note</h2>
  <textarea id="editor" placeholder="Scrivi qui..."></textarea>

  <script>
    const editor = document.getElementById('editor');

    // 1. Carica il testo presente dopo il # nell'URL
    function loadFromURL() {
      const hash = window.location.hash.substring(1);
      if (hash) {
        try {
          editor.value = decodeURIComponent(escape(atob(hash)));
        } catch (e) {
          editor.value = decodeURIComponent(hash);
        }
      }
    }

    // 2. Aggiorna l'URL in tempo reale mentre scrivi
    editor.addEventListener('input', () => {
      const text = editor.value;
      if (text) {
        const encoded = btoa(unescape(encodeURIComponent(text)));
        history.replaceState(null, null, '#' + encoded);
      } else {
        history.replaceState(null, null, window.location.pathname);
      }
    });

    loadFromURL();
  </script>
</body>
</html>
