<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Note</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✏️</text></svg>">
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      max-width: 900px; 
      margin: 20px auto; 
      padding: 0 15px; 
      color: #222; 
    }
    .title-input { 
      font-size: 26px; 
      font-weight: bold; 
      border: none; 
      outline: none; 
      width: 100%; 
      margin-bottom: 15px; 
      padding: 4px 0;
      color: #111;
      font-family: inherit;
      background: transparent;
    }
    .title-input::placeholder {
      color: #aaa;
    }
    /* Editor HTML modificabile che sostituisce la textarea */
    .editor { 
      width: 100%; 
      min-height: 70vh; 
      padding: 16px; 
      font-size: 18px; 
      border: 1px solid #ccc; 
      border-radius: 8px; 
      box-sizing: border-box; 
      line-height: 1.6; 
      outline: none;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    .editor:empty:before {
      content: attr(data-placeholder);
      color: #aaa;
    }
  </style>
</head>
<body>
  <input type="text" id="title" class="title-input" placeholder="Titolo nota..." value="Note">
  <div id="editor" class="editor" contenteditable="true" data-placeholder="Scrivi qui... (Usa Ctrl+B per Bold, Ctrl+I per Italic, Ctrl+Shift+X per Strikethrough)"></div>

  <script>
    const titleInput = document.getElementById('title');
    const editor = document.getElementById('editor');

    // 1. Gestione scorciatoia per il Barrato (Strikethrough) visivo
    editor.addEventListener('keydown', (e) => {
      const isCmdOrCtrl = e.ctrlKey || e.metaKey;
      if (isCmdOrCtrl && e.shiftKey && e.key.toLowerCase() === 'x') {
        e.preventDefault();
        document.execCommand('strikeThrough', false, null);
        updateURL();
      }
    });

    // 2. Carica titolo e contenuto HTML dall'URL
    function loadFromURL() {
      const hash = window.location.hash.substring(1);
      if (hash) {
        try {
          const decoded = decodeURIComponent(escape(atob(hash)));
          const data = JSON.parse(decoded);
          titleInput.value = data.t || 'Note';
          editor.innerHTML = data.b || '';
          document.title = data.t || 'Note';
        } catch (e) {
          // Fallback per vecchi URL di solo testo
          try {
            editor.innerText = decodeURIComponent(escape(atob(hash)));
          } catch(err) {
            editor.innerText = decodeURIComponent(hash);
          }
        }
      }
    }

    // 3. Salva titolo e codice HTML formattato nell'URL
    function updateURL() {
      const titleText = titleInput.value;
      const bodyHTML = editor.innerHTML;

      document.title = titleText || 'Note';

      if (bodyHTML || (titleText && titleText !== 'Note')) {
        const payload = JSON.stringify({ t: titleText, b: bodyHTML });
        const encoded = btoa(unescape(encodeURIComponent(payload)));
        history.replaceState(null, null, '#' + encoded);
      } else {
        history.replaceState(null, null, window.location.pathname);
      }
    }

    titleInput.addEventListener('input', updateURL);
    editor.addEventListener('input', updateURL);

    loadFromURL();
  </script>
</body>
</html>
