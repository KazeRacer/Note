<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Note</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✏️</text></svg>">
  <style>
    /* Reset & Tipografia Minimalista Notion */
    * {
      box-sizing: border-box;
    }

    body { 
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
      max-width: 800px; 
      margin: 60px auto; 
      padding: 0 24px; 
      color: #37352f;
      background-color: #ffffff;
      -webkit-font-smoothing: antialiased;
    }

    /* Titolo Nota in Cima */
    .title-input { 
      font-size: 34px; 
      font-weight: 700; 
      border: none; 
      outline: none; 
      width: 100%; 
      margin-bottom: 20px; 
      padding: 0;
      color: #37352f;
      font-family: inherit;
      background: transparent;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    .title-input::placeholder { 
      color: rgba(55, 53, 47, 0.25); 
    }

    /* Editor Senza Contorni */
    .editor { 
      width: 100%; 
      min-height: 70vh; 
      padding: 0; 
      font-size: 16px; 
      line-height: 1.5; 
      outline: none;
      border: none;
      overflow-y: auto;
      color: #37352f;
    }
    .editor:empty:before {
      content: attr(data-placeholder);
      color: rgba(55, 53, 47, 0.35);
    }

    /* Headings: H1 identico al Titolo Principale (34px) */
    .editor h1 {
      font-size: 34px;
      font-weight: 700;
      margin: 32px 0 8px 0;
      color: #37352f;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    .editor h2 {
      font-size: 24px;
      font-weight: 600;
      margin: 24px 0 6px 0;
      color: #37352f;
      letter-spacing: -0.015em;
      line-height: 1.3;
    }

    /* Elenchi */
    .editor ul, .editor ol {
      padding-left: 24px;
      margin: 4px 0;
    }
    .editor li {
      margin: 2px 0;
      line-height: 1.5;
    }

    /* Checklist To-Do */
    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin: 4px 0;
    }
    .todo-checkbox {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: #2eaadc;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .todo-text {
      flex-grow: 1;
      outline: none;
      line-height: 1.5;
    }
    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: rgba(55, 53, 47, 0.4);
    }

    /* Linea divisoria --- */
    hr {
      border: none;
      border-top: 1px solid rgba(55, 53, 47, 0.16);
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <input type="text" id="title" class="title-input" placeholder="Senza titolo" value="Note">
  <div id="editor" class="editor" contenteditable="true" data-placeholder="Scrivi qui... (# H1, ## H2, - pallini, 1. numerati, [] to-do, --- linea)"></div>

  <script>
    const titleInput = document.getElementById('title');
    const editor = document.getElementById('editor');

    // Helper per creare blocchi puliti
    function formatLineBlock(tag, textToKeep) {
      const selection = window.getSelection();
      if (!selection.rangeCount) return;
      const range = selection.getRangeAt(0);
      let node = range.startContainer;
      
      if (node.nodeType === 3) node = node.parentNode;

      const element = document.createElement(tag);
      if (tag === 'ul' || tag === 'ol') {
        element.innerHTML = `<li>${textToKeep || '<br>'}</li>`;
      } else {
        element.innerHTML = textToKeep || '<br>';
      }

      if (node === editor) {
        range.insertNode(element);
      } else if (node.tagName === 'DIV' || node.tagName === 'P') {
        node.replaceWith(element);
      } else {
        range.insertNode(element);
      }

      const newRange = document.createRange();
      const target = element.querySelector('li') || element;
      newRange.setStart(target, 0);
      newRange.collapse(true);
      selection.removeAllRanges();
      selection.addRange(newRange);
    }

    // Eventi da tastiera
    editor.addEventListener('keydown', (e) => {
      const selection = window.getSelection();
      if (!selection.rangeCount) return;
      const range = selection.getRangeAt(0);
      const node = range.startContainer;
      const text = node.textContent || '';
      const caretPos = range.startOffset;
      const lineText = text.slice(0, caretPos);

      // Trigger Spazio
      if (e.key === ' ') {
        if (lineText === '#') {
          e.preventDefault();
          formatLineBlock('h1', text.slice(caretPos));
          updateURL();
          return;
        }

        if (lineText === '##') {
          e.preventDefault();
          formatLineBlock('h2', text.slice(caretPos));
          updateURL();
          return;
        }

        if (lineText === '-' || lineText === '*') {
          e.preventDefault();
          formatLineBlock('ul', text.slice(caretPos));
          updateURL();
          return;
        }

        if (lineText === '1.') {
          e.preventDefault();
          formatLineBlock('ol', text.slice(caretPos));
          updateURL();
          return;
        }

        if (lineText === '[]') {
          e.preventDefault();
          const remainingText = text.slice(caretPos);
          
          const todoDiv = document.createElement('div');
          todoDiv.className = 'todo-item';
          todoDiv.innerHTML = `<input type="checkbox" class="todo-checkbox" contenteditable="false"><span class="todo-text" contenteditable="true">${remainingText || '<br>'}</span>`;
          
          if (node.parentNode && node.parentNode !== editor && node.parentNode.tagName === 'DIV') {
            node.parentNode.replaceWith(todoDiv);
          } else {
            range.insertNode(todoDiv);
          }
          
          const textSpan = todoDiv.querySelector('.todo-text');
          const newRange = document.createRange();
          newRange.setStart(textSpan, 0);
          newRange.collapse(true);
          selection.removeAllRanges();
          selection.addRange(newRange);
          updateURL();
          return;
        }
      }

      // Trigger Invio
      if (e.key === 'Enter') {
        if (lineText.trim() === '---') {
          e.preventDefault();
          node.textContent = '';

          const hr = document.createElement('hr');
          const nextLine = document.createElement('div');
          nextLine.innerHTML = '<br>';

          range.insertNode(nextLine);
          range.insertNode(hr);

          const newRange = document.createRange();
          newRange.setStart(nextLine, 0);
          newRange.collapse(true);
          selection.removeAllRanges();
          selection.addRange(newRange);
          updateURL();
          return;
        }

        let parentBlock = node.nodeType === 1 ? node : node.parentNode;
        if (parentBlock && (parentBlock.tagName === 'H1' || parentBlock.tagName === 'H2')) {
          e.preventDefault();
          const div = document.createElement('div');
          div.innerHTML = '<br>';
          parentBlock.after(div);

          const newRange = document.createRange();
          newRange.setStart(div, 0);
          newRange.collapse(true);
          selection.removeAllRanges();
          selection.addRange(newRange);
          updateURL();
          return;
        }

        const currentTodo = parentBlock ? parentBlock.closest('.todo-item') : null;
        if (currentTodo) {
          e.preventDefault();
          const todoText = currentTodo.querySelector('.todo-text');
          const textContent = todoText ? todoText.textContent.trim() : '';

          if (textContent === '') {
            const emptyDiv = document.createElement('div');
            emptyDiv.innerHTML = '<br>';
            currentTodo.after(emptyDiv);
            currentTodo.remove();

            const newRange = document.createRange();
            newRange.setStart(emptyDiv, 0);
            newRange.collapse(true);
            selection.removeAllRanges();
            selection.addRange(newRange);
          } else {
            const newTodo = document.createElement('div');
            newTodo.className = 'todo-item';
            newTodo.innerHTML = `<input type="checkbox" class="todo-checkbox" contenteditable="false"><span class="todo-text" contenteditable="true"><br></span>`;
            
            currentTodo.after(newTodo);

            const textSpan = newTodo.querySelector('.todo-text');
            const newRange = document.createRange();
            newRange.setStart(textSpan, 0);
            newRange.collapse(true);
            selection.removeAllRanges();
            selection.addRange(newRange);
          }
          updateURL();
          return;
        }
      }

      // Shortcut Barrato (Ctrl+Shift+X)
      if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key.toLowerCase() === 'x') {
        e.preventDefault();
        document.execCommand('strikeThrough', false, null);
        updateURL();
      }
    });

    // Checkbox Listener
    editor.addEventListener('change', (e) => {
      if (e.target.classList.contains('todo-checkbox')) {
        const todoItem = e.target.closest('.todo-item');
        if (e.target.checked) {
          todoItem.classList.add('completed');
          e.target.setAttribute('checked', 'checked');
        } else {
          todoItem.classList.remove('completed');
          e.target.removeAttribute('checked');
        }
        updateURL();
      }
    });

    // Carica da URL
    function loadFromURL() {
      const hash = window.location.hash.substring(1);
      if (hash) {
        try {
          const decoded = decodeURIComponent(escape(atob(hash)));
          const data = JSON.parse(decoded);
          titleInput.value = data.t || 'Note';
          editor.innerHTML = data.b || '';
          document.title = data.t || 'Note';

          editor.querySelectorAll('.todo-checkbox').forEach(cb => {
            if (cb.hasAttribute('checked')) {
              cb.checked = true;
            }
          });
        } catch (e) {
          try {
            editor.innerHTML = decodeURIComponent(escape(atob(hash)));
          } catch(err) {
            editor.innerText = decodeURIComponent(hash);
          }
        }
      }
    }

    // Salva nell'URL
    function updateURL() {
      const titleText = titleInput.value;
      const bodyHTML = editor.innerHTML;

      document.title = titleText || 'Note';

      if (bodyHTML || (titleText && titleText !== 'Note')) {
        const payload = JSON.stringify({ t: titleText, b: bodyHTML });
        const encoded = btoa(unescape(encodeURIComponent(payload)));
        history.replaceState(null, null, '#' + encoded);
      } else {
        history.replaceState(null, null, window.location.pathname);
      }
    }

    titleInput.addEventListener('input', updateURL);
    editor.addEventListener('input', updateURL);

    loadFromURL();
  </script>
</body>
</html>
