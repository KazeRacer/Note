<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Note</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✏️</text></svg>">
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      max-width: 900px; 
      margin: 20px auto; 
      padding: 0 15px; 
      color: #222; 
    }
    .title-input { 
      font-size: 26px; 
      font-weight: bold; 
      border: none; 
      outline: none; 
      width: 100%; 
      margin-bottom: 15px; 
      padding: 4px 0;
      color: #111;
      font-family: inherit;
      background: transparent;
    }
    .title-input::placeholder { color: #aaa; }

    .editor { 
      width: 100%; 
      min-height: 70vh; 
      padding: 16px; 
      font-size: 18px; 
      border: 1px solid #ccc; 
      border-radius: 8px; 
      box-sizing: border-box; 
      line-height: 1.6; 
      outline: none;
      overflow-y: auto;
    }
    .editor:empty:before {
      content: attr(data-placeholder);
      color: #aaa;
    }

    /* Elenchi Puntati e Numerati */
    .editor ul, .editor ol {
      padding-left: 25px;
      margin: 8px 0;
    }
    .editor li {
      margin: 4px 0;
    }

    /* Stili per Checklist To-Do */
    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 6px 0;
    }
    .todo-checkbox {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #007aff;
      flex-shrink: 0;
    }
    .todo-text {
      flex-grow: 1;
      outline: none;
    }
    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: #8e8e93;
    }

    /* Linea divisoria --- */
    hr {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 18px 0;
    }
  </style>
</head>
<body>
  <input type="text" id="title" class="title-input" placeholder="Titolo nota..." value="Note">
  <div id="editor" class="editor" contenteditable="true" data-placeholder="Scrivi qui... (- per pallini, 1. per numerati, [] per to-do, --- + Invio per linea)"></div>

  <script>
    const titleInput = document.getElementById('title');
    const editor = document.getElementById('editor');

    // Gestione trigger da tastiera
    editor.addEventListener('keydown', (e) => {
      const selection = window.getSelection();
      if (!selection.rangeCount) return;
      const range = selection.getRangeAt(0);
      const node = range.startContainer;
      const text = node.textContent || '';
      const caretPos = range.startOffset;
      const lineText = text.slice(0, caretPos);

      // --- 1. SPAZIO: Trasformazione in Elenchi e To-Do ---
      if (e.key === ' ') {
        // Trigger Elenco Puntato con Pallino (- o *)
        if (lineText === '-' || lineText === '*') {
          e.preventDefault();
          node.textContent = text.slice(caretPos);
          document.execCommand('insertUnorderedList', false, null);
          updateURL();
          return;
        }

        // Trigger Elenco Numerato (1.)
        if (lineText === '1.') {
          e.preventDefault();
          node.textContent = text.slice(caretPos);
          document.execCommand('insertOrderedList', false, null);
          updateURL();
          return;
        }

        // Trigger To-Do ([] + Spazio)
        if (lineText === '[]') {
          e.preventDefault();
          node.textContent = text.slice(caretPos);
          
          const todoDiv = document.createElement('div');
          todoDiv.className = 'todo-item';
          todoDiv.innerHTML = `<input type="checkbox" class="todo-checkbox" contenteditable="false"><span class="todo-text" contenteditable="true"><br></span>`;
          
          range.insertNode(todoDiv);
          
          const textSpan = todoDiv.querySelector('.todo-text');
          const newRange = document.createRange();
          newRange.setStart(textSpan, 0);
          newRange.collapse(true);
          selection.removeAllRanges();
          selection.addRange(newRange);
          updateURL();
          return;
        }
      }

      // --- 2. INVIO: Linea divisoria e Continuazione To-Do ---
      if (e.key === 'Enter') {
        // Trigger Separatore (--- + Invio)
        if (lineText.trim() === '---') {
          e.preventDefault();
          
          // Pulisce i '---'
          node.textContent = '';

          const hr = document.createElement('hr');
          const nextLine = document.createElement('div');
          nextLine.innerHTML = '<br>';

          range.insertNode(nextLine);
          range.insertNode(hr);

          const newRange = document.createRange();
          newRange.setStart(nextLine, 0);
          newRange.collapse(true);
          selection.removeAllRanges();
          selection.addRange(newRange);
          updateURL();
          return;
        }

        // Gestione A Capo dentro un To-Do
        const currentTodo = node.nodeType === 1 ? node.closest('.todo-item') : node.parentNode.closest('.todo-item');
        if (currentTodo) {
          e.preventDefault();
          const todoText = currentTodo.querySelector('.todo-text');
          const textContent = todoText ? todoText.textContent.trim() : '';

          // Se si preme Invio su un To-Do VUOTO, esce dal To-Do e crea riga normale
          if (textContent === '') {
            const emptyDiv = document.createElement('div');
            emptyDiv.innerHTML = '<br>';
            currentTodo.after(emptyDiv);
            currentTodo.remove();

            const newRange = document.createRange();
            newRange.setStart(emptyDiv, 0);
            newRange.collapse(true);
            selection.removeAllRanges();
            selection.addRange(newRange);
          } else {
            // Se c'è testo, crea un NUOVO To-Do sotto
            const newTodo = document.createElement('div');
            newTodo.className = 'todo-item';
            newTodo.innerHTML = `<input type="checkbox" class="todo-checkbox" contenteditable="false"><span class="todo-text" contenteditable="true"><br></span>`;
            
            currentTodo.after(newTodo);

            const textSpan = newTodo.querySelector('.todo-text');
            const newRange = document.createRange();
            newRange.setStart(textSpan, 0);
            newRange.collapse(true);
            selection.removeAllRanges();
            selection.addRange(newRange);
          }
          updateURL();
          return;
        }
      }

      // Shortcut Barrato (Ctrl+Shift+X)
      if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key.toLowerCase() === 'x') {
        e.preventDefault();
        document.execCommand('strikeThrough', false, null);
        updateURL();
      }
    });

    // Gestione click sulle checkbox To-Do
    editor.addEventListener('change', (e) => {
      if (e.target.classList.contains('todo-checkbox')) {
        const todoItem = e.target.closest('.todo-item');
        if (e.target.checked) {
          todoItem.classList.add('completed');
          e.target.setAttribute('checked', 'checked');
        } else {
          todoItem.classList.remove('completed');
          e.target.removeAttribute('checked');
        }
        updateURL();
      }
    });

    // Carica da URL
    function loadFromURL() {
      const hash = window.location.hash.substring(1);
      if (hash) {
        try {
          const decoded = decodeURIComponent(escape(atob(hash)));
          const data = JSON.parse(decoded);
          titleInput.value = data.t || 'Note';
          editor.innerHTML = data.b || '';
          document.title = data.t || 'Note';

          editor.querySelectorAll('.todo-checkbox').forEach(cb => {
            if (cb.hasAttribute('checked')) {
              cb.checked = true;
            }
          });
        } catch (e) {
          try {
            editor.innerHTML = decodeURIComponent(escape(atob(hash)));
          } catch(err) {
            editor.innerText = decodeURIComponent(hash);
          }
        }
      }
    }

    // Salva nell'URL
    function updateURL() {
      const titleText = titleInput.value;
      const bodyHTML = editor.innerHTML;

      document.title = titleText || 'Note';

      if (bodyHTML || (titleText && titleText !== 'Note')) {
        const payload = JSON.stringify({ t: titleText, b: bodyHTML });
        const encoded = btoa(unescape(encodeURIComponent(payload)));
        history.replaceState(null, null, '#' + encoded);
      } else {
        history.replaceState(null, null, window.location.pathname);
      }
    }

    titleInput.addEventListener('input', updateURL);
    editor.addEventListener('input', updateURL);

    loadFromURL();
  </script>
</body>
</html>
