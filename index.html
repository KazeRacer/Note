<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Note</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✏️</text></svg>">
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      max-width: 900px; 
      margin: 20px auto; 
      padding: 0 15px; 
      color: #222; 
    }
    h2 { 
      margin-top: 10px; 
      font-size: 24px;
    }
    textarea { 
      width: 100%; 
      height: 70vh; 
      padding: 16px; 
      font-size: 18px; 
      border: 1px solid #ccc; 
      border-radius: 8px; 
      box-sizing: border-box; 
      line-height: 1.6; 
      font-family: inherit; 
      resize: vertical;
    }
  </style>
</head>
<body>
  <h2>Note</h2>
  <textarea id="editor" placeholder="Scrivi qui..."></textarea>

  <script>
    const editor = document.getElementById('editor');

    // 1. Carica il testo presente dopo il # nell'URL
    function loadFromURL() {
      const hash = window.location.hash.substring(1);
      if (hash) {
        try {
          editor.value = decodeURIComponent(escape(atob(hash)));
        } catch (e) {
          editor.value = decodeURIComponent(hash);
        }
      }
    }

    // 2. Aggiorna l'URL in tempo reale mentre scrivi
    editor.addEventListener('input', () => {
      const text = editor.value;
      if (text) {
        const encoded = btoa(unescape(encodeURIComponent(text)));
        history.replaceState(null, null, '#' + encoded);
      } else {
        history.replaceState(null, null, window.location.pathname);
      }
    });

    loadFromURL();
  </script>
</body>
</html>
