<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notion Style Toggle Editor</title>
  
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f9fafb;
      color: #374151;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
      margin: 0;
    }

    .editor-container {
      width: 100%;
      max-width: 750px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 32px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    /* Stili ProseMirror / TipTap */
    .ProseMirror {
      outline: none;
      min-height: 300px;
    }

    .ProseMirror p {
      margin: 4px 0;
      line-height: 1.6;
    }

    /* --------------------------------------------------
       STILI TOGGLE NOTION
    -------------------------------------------------- */
    
    /* Container wrapper */
    .notion-toggle {
      margin: 4px 0;
    }

    /* Summary / Header del Trigger */
    summary.notion-toggle-header {
      cursor: pointer;
      list-style: none;
      position: relative;
      padding-left: 22px;
      outline: none;
      user-select: none;
      display: block;
      margin: 2px 0;
    }

    /* Rimuove freccia di default su Safari/Chrome */
    summary.notion-toggle-header::-webkit-details-marker {
      display: none;
    }

    /* Freccia Custom stile Notion */
    summary.notion-toggle-header::before {
      content: "▶";
      position: absolute;
      left: 4px;
      top: 2px;
      font-size: 10px;
      color: #9ca3af;
      transition: transform 0.15s ease;
    }

    /* Rotazione della freccia quando aperto */
    details.notion-toggle[open] > summary.notion-toggle-header::before {
      transform: rotate(90deg);
    }

    /* Body indentato */
    .notion-toggle-body {
      padding-left: 22px;
      border-left: 2px solid #f3f4f6;
      margin-left: 8px;
      margin-top: 2px;
      margin-bottom: 4px;
    }

    /* Supporto per Headings dentro il trigger */
    summary.notion-toggle-header h1,
    summary.notion-toggle-header h2,
    summary.notion-toggle-header h3 {
      display: inline;
      margin: 0;
    }
  </style>

  <!-- TipTap / ProseMirror Bundle CDN -->
  <script src="https://unpkg.com/@tiptap/pm@2.1.13/dist/index.js"></script>
  <script src="https://unpkg.com/@tiptap/core@2.1.13/dist/index.js"></script>
  <script src="https://unpkg.com/@tiptap/starter-kit@2.1.13/dist/index.js"></script>
</head>
<body>

  <div class="editor-container">
    <div id="editor"></div>
  </div>

  <script>
    const { Editor, Node, mergeAttributes, InputRule } = window.tiptapCore;
    const StarterKit = window.tiptapStarterKit.default || window.tiptapStarterKit;

    // 1. Nodo Wrapper ToggleSection (<details>)
    const ToggleSection = Node.create({
      name: 'toggleSection',
      group: 'block',
      content: 'toggleHeader toggleBody',
      isolating: true,

      parseHTML() {
        return [{ tag: 'details' }];
      },
      renderHTML({ HTMLAttributes }) {
        return ['details', mergeAttributes(HTMLAttributes, { class: 'notion-toggle', open: 'open' }), 0];
      },
    });

    // 2. Nodo Trigger/Header (<summary>)
    const ToggleHeader = Node.create({
      name: 'toggleHeader',
      group: 'block',
      content: 'inline*',
      defining: true,

      parseHTML() {
        return [{ tag: 'summary' }];
      },
      renderHTML({ HTMLAttributes }) {
        return ['summary', mergeAttributes(HTMLAttributes, { class: 'notion-toggle-header' }), 0];
      },
    });

    // 3. Nodo Body (Contenuto Indentato)
    const ToggleBody = Node.create({
      name: 'toggleBody',
      group: 'block',
      content: 'block+',
      defining: true,

      parseHTML() {
        return [{ tag: 'div' }];
      },
      renderHTML({ HTMLAttributes }) {
        return ['div', mergeAttributes(HTMLAttributes, { class: 'notion-toggle-body' }), 0];
      },
    });

    // Extension personalizzata per raccogliere nodi, regole di input e tasti
    const NotionToggle = Node.create({
      name: 'notionToggleExtension',

      addExtensions() {
        return [ToggleSection, ToggleHeader, ToggleBody];
      },

      addInputRules() {
        return [
          new InputRule({
            find: /^>\s$/,
            handler: ({ range, chain }) => {
              chain()
                .deleteRange(range)
                .insertContent({
                  type: 'toggleSection',
                  content: [
                    { type: 'toggleHeader' },
                    { type: 'toggleBody', content: [{ type: 'paragraph' }] }
                  ]
                })
                .focus()
                .run();
            },
          }),
        ];
      },

      addKeyboardShortcuts() {
        return {
          Enter: ({ editor }) => {
            const { selection } = editor.state;
            const { $from } = selection;

            // 1. Se sei nell'Header e premi Invio -> scendi nel Body
            if ($from.parent.type.name === 'toggleHeader') {
              return editor.commands.focus($from.pos + 2);
            }

            // 2. Se sei nel Body su riga vuota e premi Invio -> Esci dal Toggle
            if (
              $from.parent.type.name === 'paragraph' &&
              $from.parent.content.size === 0 &&
              $from.node(-1)?.type.name === 'toggleBody'
            ) {
              return editor.chain().lift().run();
            }

            return false;
          },

          Backspace: ({ editor }) => {
            const { selection } = editor.state;
            const { $from } = selection;

            // Se sei a inizio riga dentro un paragrafo vuoto nel ToggleBody -> Esci dal Toggle
            if (
              $from.parent.type.name === 'paragraph' &&
              $from.parentOffset === 0 &&
              $from.node(-1)?.type.name === 'toggleBody'
            ) {
              return editor.chain().lift().run();
            }

            return false;
          },
        };
      },
    });

    // Inizializzazione Editor
    const editor = new Editor({
      element: document.querySelector('#editor'),
      extensions: [
        StarterKit,
        NotionToggle,
      ],
      content: `
        <p>Digita <code>&gt;</code> seguito da uno <strong>spazio</strong> per creare un toggle in stile Notion.</p>
      `,
    });
  </script>
</body>
</html>
