<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Note</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✏️</text></svg>">
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      max-width: 900px; 
      margin: 20px auto; 
      padding: 0 15px; 
      color: #222; 
    }
    .title-input { 
      font-size: 26px; 
      font-weight: bold; 
      border: none; 
      outline: none; 
      width: 100%; 
      margin-bottom: 15px; 
      padding: 4px 0;
      color: #111;
      font-family: inherit;
      background: transparent;
    }
    .title-input::placeholder { color: #aaa; }

    .editor { 
      width: 100%; 
      min-height: 70vh; 
      padding: 16px; 
      font-size: 18px; 
      border: 1px solid #ccc; 
      border-radius: 8px; 
      box-sizing: border-box; 
      line-height: 1.6; 
      outline: none;
      overflow-y: auto;
    }
    .editor:empty:before {
      content: attr(data-placeholder);
      color: #aaa;
    }

    /* Stili per la Checklist To-Do */
    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 4px 0;
    }
    .todo-checkbox {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #007aff;
      flex-shrink: 0;
    }
    .todo-text {
      flex-grow: 1;
      outline: none;
    }
    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: #8e8e93;
    }

    /* Linea divisoria --- */
    hr {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 16px 0;
    }
  </style>
</head>
<body>
  <input type="text" id="title" class="title-input" placeholder="Titolo nota..." value="Note">
  <div id="editor" class="editor" contenteditable="true" data-placeholder="Scrivi qui... (- per elenchi, [] per to-do, --- per separatore)"></div>

  <script>
    const titleInput = document.getElementById('title');
    const editor = document.getElementById('editor');

    // Gestione tastiera (Trattini, To-Do, Linea Divisoria)
    editor.addEventListener('keydown', (e) => {
      const selection = window.getSelection();
      if (!selection.rangeCount) return;
      const range = selection.getRangeAt(0);
      const node = range.startContainer;
      
      // 1. Pressione di SPAZIO per convertire i trigger ([], ---)
      if (e.key === ' ') {
        const text = node.textContent || '';
        const caretPos = range.startOffset;
        const textBeforeCaret = text.slice(0, caretPos);

        // Trigger Checkbox: [] + Spazio
        if (textBeforeCaret === '[]') {
          e.preventDefault();
          node.textContent = text.slice(caretPos);
          
          const todoDiv = document.createElement('div');
          todoDiv.className = 'todo-item';
          todoDiv.innerHTML = `<input type="checkbox" class="todo-checkbox" contenteditable="false"><span class="todo-text" contenteditable="true"><br></span>`;
          
          range.insertNode(todoDiv);
          
          const textSpan = todoDiv.querySelector('.todo-text');
          const newRange = document.createRange();
          newRange.setStart(textSpan, 0);
          newRange.collapse(true);
          selection.removeAllRanges();
          selection.addRange(newRange);
          updateURL();
          return;
        }

        // Trigger Separatore: --- + Spazio
        if (textBeforeCaret === '---') {
          e.preventDefault();
          node.textContent = text.slice(caretPos);
          const hr = document.createElement('hr');
          const emptyDiv = document.createElement('div');
          emptyDiv.innerHTML = '<br>';
          
          range.insertNode(emptyDiv);
          range.insertNode(hr);

          const newRange = document.createRange();
          newRange.setStart(emptyDiv, 0);
          newRange.collapse(true);
          selection.removeAllRanges();
          selection.addRange(newRange);
          updateURL();
          return;
        }
      }

      // 2. Pressione di INVIO (Auto-Trattino e invio su To-Do)
      if (e.key === 'Enter') {
        const text = node.textContent || '';
        
        // Auto-continuità dell'elenco puntato con trattino
        if (text.startsWith('- ')) {
          if (text.trim() === '-') {
            // Se si preme Invio su un trattino vuoto, si interrompe l'elenco
            e.preventDefault();
            node.textContent = '';
            const div = document.createElement('div');
            div.innerHTML = '<br>';
            range.insertNode(div);
            const newRange = document.createRange();
            newRange.setStart(div, 0);
            newRange.collapse(true);
            selection.removeAllRanges();
            selection.addRange(newRange);
          } else {
            e.preventDefault();
            const div = document.createElement('div');
            div.textContent = '- ';
            
            // Inserisci nuova riga col trattino
            if (node.parentNode && node.parentNode !== editor) {
              node.parentNode.after(div);
            } else {
              range.insertNode(div);
            }

            const newRange = document.createRange();
            newRange.setStart(div, 1);
            newRange.collapse(false);
            selection.removeAllRanges();
            selection.addRange(newRange);
          }
          updateURL();
        }
      }

      // Shortcut Barrato (Ctrl+Shift+X)
      if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key.toLowerCase() === 'x') {
        e.preventDefault();
        document.execCommand('strikeThrough', false, null);
        updateURL();
      }
    });

    // Gestione click sulle checkbox (Attiva/Disattiva barrato e grigio)
    editor.addEventListener('change', (e) => {
      if (e.target.classList.contains('todo-checkbox')) {
        const todoItem = e.target.closest('.todo-item');
        if (e.target.checked) {
          todoItem.classList.add('completed');
          e.target.setAttribute('checked', 'checked');
        } else {
          todoItem.classList.remove('completed');
          e.target.removeAttribute('checked');
        }
        updateURL();
      }
    });

    // Carica da URL
    function loadFromURL() {
      const hash = window.location.hash.substring(1);
      if (hash) {
        try {
          const decoded = decodeURIComponent(escape(atob(hash)));
          const data = JSON.parse(decoded);
          titleInput.value = data.t || 'Note';
          editor.innerHTML = data.b || '';
          document.title = data.t || 'Note';

          // Ripristina lo stato visivo delle checkbox salvate
          editor.querySelectorAll('.todo-checkbox').forEach(cb => {
            if (cb.hasAttribute('checked')) {
              cb.checked = true;
            }
          });
        } catch (e) {
          try {
            editor.innerHTML = decodeURIComponent(escape(atob(hash)));
          } catch(err) {
            editor.innerText = decodeURIComponent(hash);
          }
        }
      }
    }

    // Salva nell'URL
    function updateURL() {
      const titleText = titleInput.value;
      const bodyHTML = editor.innerHTML;

      document.title = titleText || 'Note';

      if (bodyHTML || (titleText && titleText !== 'Note')) {
        const payload = JSON.stringify({ t: titleText, b: bodyHTML });
        const encoded = btoa(unescape(encodeURIComponent(payload)));
        history.replaceState(null, null, '#' + encoded);
      } else {
        history.replaceState(null, null, window.location.pathname);
      }
    }

    titleInput.addEventListener('input', updateURL);
    editor.addEventListener('input', updateURL);

    loadFromURL();
  </script>
</body>
</html>
