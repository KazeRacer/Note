<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-visual">
  <title>Note</title>
  <link id="favicon" rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✏️</text></svg>">
  <style>
    * { box-sizing: border-box; }

    :root {
      --text-main: #37352f;
      --text-muted: rgba(55, 53, 47, 0.45);
      --bg-hover: rgba(55, 53, 47, 0.06);
      --border-subtle: rgba(55, 53, 47, 0.09);
      --shadow-popover: 0 12px 32px rgba(15, 15, 15, 0.12), 0 2px 6px rgba(15, 15, 15, 0.04);
    }

    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      max-width: 720px; 
      margin: 0 auto; 
      padding: 32px 20px 120px 48px;
      color: var(--text-main);
      background-color: #ffffff;
      -webkit-font-smoothing: antialiased;
    }

    /* Top Bar */
    .top-bar {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      margin-bottom: 28px;
    }

    .btn-action {
      background: transparent;
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 500;
      color: rgba(55, 53, 47, 0.65);
      cursor: pointer;
      transition: all 0.12s ease;
    }

    .btn-action:hover {
      background: var(--bg-hover);
      color: var(--text-main);
    }

    /* Title & Emoji Header Group */
    .header-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      position: relative;
    }

    .emoji-btn {
      font-size: 32px;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 8px;
      transition: background 0.12s ease;
      line-height: 1;
      user-select: none;
      flex-shrink: 0;
      margin-left: -48px; 
    }

    .emoji-btn:hover { background: var(--bg-hover); }

    .emoji-picker {
      display: none;
      position: absolute;
      top: 48px;
      left: -48px;
      background: #ffffff;
      border: 1px solid var(--border-subtle);
      box-shadow: var(--shadow-popover);
      border-radius: 10px;
      padding: 8px;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
      z-index: 3000;
      width: 220px;
      box-sizing: border-box;
    }

    .emoji-picker button {
      background: transparent;
      border: none;
      font-size: 20px;
      padding: 6px;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }

    .emoji-picker button:hover { background: var(--bg-hover); }

    .title-input { 
      font-size: 36px; 
      font-weight: 700; 
      color: var(--text-main);
      letter-spacing: -0.025em;
      line-height: 1.15;
      margin: 0;
      padding: 0;
      border: none; 
      outline: none;
      background: transparent;
      width: 100%;
    }

    .title-input::placeholder { color: rgba(55, 53, 47, 0.2); }

    /* Editor Main Area */
    .editor { 
      width: 100%; 
      min-height: 60vh; 
      font-size: 16px; 
      line-height: 1.6; 
      outline: none;
      border: none;
      color: var(--text-main);
      position: relative;
    }

    .editor.is-empty::before {
      content: attr(data-placeholder);
      color: rgba(55, 53, 47, 0.3);
      pointer-events: none;
      position: absolute;
      top: 0;
      left: 0;
    }

    .editor > *:first-child { margin-top: 0; }

    /* Headings Style Update */
    .editor h1 { 
      font-size: 36px; 
      font-weight: 700; 
      margin: 28px 0 8px 0; 
      letter-spacing: -0.025em; 
      line-height: 1.15;
    }

    .editor h2 { 
      font-size: 24px; 
      font-weight: 600; 
      margin: 22px 0 6px 0; 
      letter-spacing: -0.018em; 
      line-height: 1.25;
    }

    .editor h3 { 
      font-size: 19px; 
      font-weight: 400; 
      margin: 16px 0 4px 0; 
      letter-spacing: -0.01em; 
      line-height: 1.35;
    }

    .editor p, .editor div {
      margin: 4px 0;
    }

    /* TOGGLE BLOCK */
    .editor details.notion-toggle { margin: 4px 0; }

    .editor summary.notion-toggle-header {
      cursor: pointer;
      list-style: none;
      outline: none;
      display: flex;
      align-items: flex-start;
      gap: 6px;
      margin: 2px 0;
      user-select: none;
    }

    .editor summary.notion-toggle-header::-webkit-details-marker { display: none; }

    .editor summary.notion-toggle-header::before {
      content: "▶";
      font-size: 9px;
      color: var(--text-muted);
      transition: transform 0.15s ease;
      width: 14px;
      text-align: center;
      flex-shrink: 0;
      margin-top: 8px;
    }

    .editor details.notion-toggle[open] > summary.notion-toggle-header::before {
      transform: rotate(90deg);
    }

    .editor .notion-toggle-title {
      flex-grow: 1;
      outline: none;
      min-height: 24px;
      cursor: text;
    }

    /* Heading styles usable INSIDE the toggle title span (kept inline, not a block swap) */
    .editor .notion-toggle-title.as-h1 {
      font-size: 36px; font-weight: 700; letter-spacing: -0.025em; line-height: 1.15; display: block;
    }
    .editor .notion-toggle-title.as-h2 {
      font-size: 24px; font-weight: 600; letter-spacing: -0.018em; line-height: 1.25; display: block;
    }
    .editor .notion-toggle-title.as-h3 {
      font-size: 19px; font-weight: 400; letter-spacing: -0.01em; line-height: 1.35; display: block;
    }

    .editor .notion-toggle-body {
      padding-left: 18px;
      border-left: 2px solid rgba(55, 53, 47, 0.1);
      margin-left: 6px;
      margin-top: 4px;
      margin-bottom: 6px;
    }

    .editor .notion-toggle-body .todo-item,
    .editor .notion-toggle-body ul,
    .editor .notion-toggle-body ol { margin-left: 0 !important; }

    .editor .notion-toggle-body ul,
    .editor .notion-toggle-body ol { padding-left: 18px; }

    /* Callout */
    .editor blockquote {
      margin: 10px 0;
      padding: 10px 14px;
      border-left: 3px solid #37352f;
      background: rgba(55, 53, 47, 0.035);
      border-radius: 0 6px 6px 0;
    }

    mark.notion-highlight {
      background-color: #fef3c7;
      color: inherit;
      padding: 1px 3px;
      border-radius: 3px;
    }

    /* Lists */
    .editor ul, .editor ol { padding-left: 20px; margin: 4px 0; }
    .editor li { margin: 2px 0; }

    /* To-Do Checklist */
    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin: 3px 0;
    }
    .todo-checkbox {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: #2eaadc;
      flex-shrink: 0;
      margin-top: 5px;
    }
    .todo-text { flex-grow: 1; outline: none; }
    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    /* Divider */
    hr {
      border: none;
      border-top: 1px solid var(--border-subtle);
      margin: 18px 0;
    }

    /* Command Menu */
    .notion-menu {
      display: none;
      position: fixed;
      z-index: 2000;
      background: #ffffff;
      border: 1px solid var(--border-subtle);
      box-shadow: var(--shadow-popover);
      border-radius: 10px;
      padding: 6px;
      width: 280px;
      max-height: 460px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .notion-menu-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      padding: 6px 8px 4px 8px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .notion-menu button {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      background: transparent;
      border: none;
      padding: 8px;
      font-size: 13.5px;
      color: var(--text-main);
      cursor: pointer;
      border-radius: 6px;
      text-align: left;
      box-sizing: border-box;
    }

    .notion-menu button:hover,
    .notion-menu button.selected {
      background: var(--bg-hover);
    }

    .menu-icon-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      background: rgba(55, 53, 47, 0.05);
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      color: rgba(55, 53, 47, 0.7);
      flex-shrink: 0;
    }

    .menu-text-group { 
      display: flex; 
      flex-direction: column; 
      overflow: hidden;
    }

    .menu-title { 
      font-size: 13.5px; 
      font-weight: 500; 
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .menu-desc { 
      font-size: 11px; 
      color: var(--text-muted); 
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .notion-menu .divider { height: 1px; background: var(--border-subtle); margin: 4px 0; }

    /* Mobile Sticky Toolbar */
    .mobile-toolbar {
      display: none;
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: #ffffff;
      border: 1px solid var(--border-subtle);
      box-shadow: var(--shadow-popover);
      border-radius: 30px;
      padding: 4px 10px;
      gap: 2px;
      z-index: 1500;
      align-items: center;
    }

    .toolbar-btn {
      background: transparent;
      border: none;
      padding: 6px 10px;
      font-size: 14px;
      color: var(--text-main);
      cursor: pointer;
      border-radius: 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toolbar-btn:active { background: var(--bg-hover); }

    @media (max-width: 768px) {
      body { padding: 16px 16px 140px 16px; }
      .emoji-btn { margin-left: 0; }
      .emoji-picker { left: 0; }
      .mobile-toolbar { display: flex; }
      .notion-menu {
        position: fixed;
        left: 50% !important;
        transform: translateX(-50%);
        bottom: 70px !important;
        top: auto !important;
        width: 90vw;
        max-width: 320px;
      }
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <button class="btn-action" id="btn-copy">📋 Copy Link</button>
    <button class="btn-action" id="btn-new">➕ New Note</button>
  </div>

  <div class="header-group">
    <button id="emoji-btn" class="emoji-btn" title="Change Icon">✏️</button>
    <div id="emoji-picker" class="emoji-picker">
      <button>✏️</button><button>📝</button><button>💡</button><button>📌</button><button>⭐</button><button>🔥</button>
      <button>🚀</button><button>🎯</button><button>📚</button><button>💻</button><button>🛠️</button><button>🎨</button>
      <button>✅</button><button>🧠</button><button>📊</button><button>💰</button><button>🌐</button><button>☕</button>
    </div>
    <input type="text" id="title" class="title-input" placeholder="Untitled" value="Note">
  </div>

  <div id="editor" class="editor" contenteditable="true" data-placeholder="Type '/' or right click for commands..."><div><br></div></div>

  <!-- Command Menu -->
  <div id="command-menu" class="notion-menu">
    <div class="notion-menu-label">Intestazioni</div>
    <button data-cmd="p">
      <span class="menu-icon-badge">T</span>
      <div class="menu-text-group"><span class="menu-title">Text</span><span class="menu-desc">Testo normale</span></div>
    </button>
    <button data-cmd="h1">
      <span class="menu-icon-badge">H1</span>
      <div class="menu-text-group"><span class="menu-title">Heading 1</span><span class="menu-desc">Titolo grande</span></div>
    </button>
    <button data-cmd="h2">
      <span class="menu-icon-badge">H2</span>
      <div class="menu-text-group"><span class="menu-title">Heading 2</span><span class="menu-desc">Titolo medio</span></div>
    </button>
    <button data-cmd="h3">
      <span class="menu-icon-badge">H3</span>
      <div class="menu-text-group"><span class="menu-title">Heading 3</span><span class="menu-desc">Titolo piccolo (regular)</span></div>
    </button>

    <div class="divider"></div>

    <div class="notion-menu-label">Blocchi</div>
    <button data-cmd="bullet">
      <span class="menu-icon-badge">•</span>
      <div class="menu-text-group"><span class="menu-title">Bulleted List</span><span class="menu-desc">Elenco puntato</span></div>
    </button>
    <button data-cmd="number">
      <span class="menu-icon-badge">1.</span>
      <div class="menu-text-group"><span class="menu-title">Numbered List</span><span class="menu-desc">Elenco numerato</span></div>
    </button>
    <button data-cmd="todo">
      <span class="menu-icon-badge">☑️</span>
      <div class="menu-text-group"><span class="menu-title">To-do List</span><span class="menu-desc">Lista di controllo</span></div>
    </button>
    <button data-cmd="toggle">
      <span class="menu-icon-badge">▶</span>
      <div class="menu-text-group"><span class="menu-title">Toggle List</span><span class="menu-desc">Testo collassabile</span></div>
    </button>
    <button data-cmd="quote">
      <span class="menu-icon-badge">💬</span>
      <div class="menu-text-group"><span class="menu-title">Callout</span><span class="menu-desc">Citazione/Evidenziato</span></div>
    </button>
    <button data-cmd="hr">
      <span class="menu-icon-badge">➖</span>
      <div class="menu-text-group"><span class="menu-title">Divider</span><span class="menu-desc">Separatore orizzontale</span></div>
    </button>

    <div class="divider"></div>

    <div class="notion-menu-label">Formattazione</div>
    <button data-cmd="bold">
      <span class="menu-icon-badge"><b>B</b></span>
      <div class="menu-text-group"><span class="menu-title">Bold</span><span class="menu-desc">Grassetto</span></div>
    </button>
    <button data-cmd="italic">
      <span class="menu-icon-badge"><i>I</i></span>
      <div class="menu-text-group"><span class="menu-title">Italic</span><span class="menu-desc">Corsivo</span></div>
    </button>
    <button data-cmd="strike">
      <span class="menu-icon-badge"><s>S</s></span>
      <div class="menu-text-group"><span class="menu-title">Strikethrough</span><span class="menu-desc">Barrato</span></div>
    </button>
    <button data-cmd="highlight">
      <span class="menu-icon-badge" style="background:#fef3c7;">🟡</span>
      <div class="menu-text-group"><span class="menu-title">Highlight</span><span class="menu-desc">Evidenzia testo</span></div>
    </button>
  </div>

  <!-- Mobile Floating Toolbar -->
  <div class="mobile-toolbar">
    <button class="toolbar-btn" data-cmd="menu" style="font-size: 16px; font-weight:700;">＋</button>
    <div style="width:1px; height:16px; background:var(--border-subtle); margin:0 2px;"></div>
    <button class="toolbar-btn" data-cmd="bold"><b>B</b></button>
    <button class="toolbar-btn" data-cmd="italic"><i>I</i></button>
    <button class="toolbar-btn" data-cmd="highlight">🟡</button>
    <button class="toolbar-btn" data-cmd="todo">☑️</button>
    <button class="toolbar-btn" data-cmd="toggle">▶</button>
    <button class="toolbar-btn" id="btn-copy-mobile" style="font-size: 12px;">📋 Link</button>
  </div>

  <script>
    const titleInput = document.getElementById('title');
    const editor = document.getElementById('editor');
    const commandMenu = document.getElementById('command-menu');
    const emojiBtn = document.getElementById('emoji-btn');
    const emojiPicker = document.getElementById('emoji-picker');
    const favicon = document.getElementById('favicon');

    let currentEmoji = '✏️';
    let menuButtons = [];
    let selectedIndex = 0;
    let savedRange = null; // Memorizza la selezione attiva al momento del tasto destro

    function setFavicon(emoji) {
      currentEmoji = emoji;
      emojiBtn.textContent = emoji;
      favicon.href = `data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>${emoji}</text></svg>`;
    }

    emojiBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      emojiPicker.style.display = emojiPicker.style.display === 'grid' ? 'none' : 'grid';
    });

    emojiPicker.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        setFavicon(btn.textContent);
        emojiPicker.style.display = 'none';
        updateURL();
      });
    });

    // Ripristina la selezione salvata nel DOM
    function restoreSelection() {
      if (savedRange) {
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(savedRange);
      }
    }

    // La selezione va "ripristinata" da savedRange SOLO quando il focus è
    // davvero uscito dall'editor (es. dopo aver cliccato un bottone del menu
    // contestuale, che ruba il focus). Se la selezione corrente è già dentro
    // #editor (come succede con TUTTE le scorciatoie da tastiera: "-", "> ",
    // "## ", ecc.) va lasciata stare: forzare sempre savedRange sovrascriveva
    // la posizione corretta con quella vecchia, salvata l'ultima volta che
    // era stato aperto un menu, ed era la causa di quasi tutti i bug di
    // posizionamento (secondo toggle che "torna" al primo, elenchi puntati
    // che non si creano più dopo il primo, ecc.).
    function ensureSelectionInEditor() {
      const sel = window.getSelection();
      if (sel.rangeCount > 0) {
        const range = sel.getRangeAt(0);
        if (editor.contains(range.startContainer)) {
          return; // la selezione è già valida, non toccarla
        }
      }
      restoreSelection();
    }

    // ---------------------------------------------------------------------
    // Trova il "contesto di editing" corrente a partire da un nodo:
    // - 'title'  -> siamo dentro il titolo di un toggle (span.notion-toggle-title)
    // - 'block'  -> siamo dentro un normale blocco di primo livello (div/p/h1/h2/h3/blockquote/li)
    // Se non troviamo nessun blocco valido (perché il testo è ancora un nodo
    // "orfano" direttamente dentro #editor), ritorniamo el:null cosi' il
    // chiamante sa che deve avvolgere il testo invece di sostituire l'editor.
    // ---------------------------------------------------------------------
    function getEditingContext(startNode) {
      let node = startNode && startNode.nodeType === 3 ? startNode.parentNode : startNode;
      if (!node) return { type: 'block', el: null };

      const titleEl = node.closest('.notion-toggle-title');
      if (titleEl) return { type: 'title', el: titleEl };

      let block = node.closest('div, p, h1, h2, h3, blockquote, li');
      if (block === editor) block = null;
      return { type: 'block', el: block };
    }

    function setToggleTitleStyle(titleEl, cmd) {
      titleEl.classList.remove('as-h1', 'as-h2', 'as-h3');
      if (cmd === 'h1') titleEl.classList.add('as-h1');
      else if (cmd === 'h2') titleEl.classList.add('as-h2');
      else if (cmd === 'h3') titleEl.classList.add('as-h3');
      // cmd === 'p' -> nessuna classe, torna al testo normale
      setFocusAtEnd(titleEl);
      updateURL();
    }

    function formatLineBlock(tag, textToKeep) {
      ensureSelectionInEditor();
      const selection = window.getSelection();
      if (!selection.rangeCount) return;
      const range = selection.getRangeAt(0);

      const element = document.createElement(tag);
      if (tag === 'ul' || tag === 'ol') {
        element.innerHTML = `<li>${textToKeep || '<br>'}</li>`;
      } else {
        element.innerHTML = textToKeep || '<br>';
      }

      const ctx = getEditingContext(range.startContainer);

      if (ctx.el) {
        // Blocco di primo livello trovato: lo sostituiamo normalmente
        ctx.el.replaceWith(element);
      } else {
        // Nessun blocco (es. testo "orfano" ancora dentro #editor sulla
        // primissima riga): ripuliamo il testo residuo e inseriamo il nuovo
        // elemento al posto giusto, cosi' non restano caratteri duplicati.
        range.deleteContents();
        let node = range.startContainer;
        if (node.nodeType === 3) node = node.parentNode;
        if (node === editor) {
          editor.innerHTML = '';
        }
        editor.appendChild(element);
      }

      const target = element.querySelector('li') || element;
      setFocusAtEnd(target);
      updateURL();
    }

    function insertToggleBlock(textToKeep = '') {
      ensureSelectionInEditor();
      const selection = window.getSelection();
      if (!selection.rangeCount) return;
      const range = selection.getRangeAt(0);

      const ctx = getEditingContext(range.startContainer);
      // Non ha senso creare un toggle dentro il titolo di un altro toggle
      if (ctx.type === 'title') return;

      const details = document.createElement('details');
      details.className = 'notion-toggle';
      details.open = true;

      const summary = document.createElement('summary');
      summary.className = 'notion-toggle-header';

      const titleSpan = document.createElement('span');
      titleSpan.className = 'notion-toggle-title';
      // NB: niente contentEditable qui. #editor è già contenteditable, e
      // annidare un'altra regione editabile dentro (span contentEditable
      // dentro un editor già editabile) confonde il browser sul backspace
      // ai bordi, causando comportamenti a caso come il <details> che
      // torna al rendering nativo "Dettagli" quando il titolo si svuota.
      titleSpan.innerHTML = textToKeep || '<br>';

      summary.appendChild(titleSpan);

      const body = document.createElement('div');
      body.className = 'notion-toggle-body';
      body.innerHTML = '<div><br></div>';

      details.appendChild(summary);
      details.appendChild(body);

      if (ctx.el) {
        ctx.el.replaceWith(details);
      } else {
        range.deleteContents();
        let node = range.startContainer;
        if (node.nodeType === 3) node = node.parentNode;
        if (node === editor) editor.innerHTML = '';
        editor.appendChild(details);
      }

      setFocusAtEnd(titleSpan);
      updateURL();
    }

    function insertDivider() {
      ensureSelectionInEditor();
      const selection = window.getSelection();
      if (!selection.rangeCount) return;
      const range = selection.getRangeAt(0);

      const ctx = getEditingContext(range.startContainer);
      if (ctx.type === 'title') return;

      const hr = document.createElement('hr');
      const nextDiv = document.createElement('div');
      nextDiv.innerHTML = '<br>';

      if (ctx.el) {
        ctx.el.replaceWith(hr);
        hr.after(nextDiv);
      } else {
        range.deleteContents();
        let node = range.startContainer;
        if (node.nodeType === 3) node = node.parentNode;
        if (node === editor) editor.innerHTML = '';
        editor.appendChild(hr);
        editor.appendChild(nextDiv);
      }

      setFocusAtEnd(nextDiv);
      updateURL();
    }

    function toggleHighlight() {
      ensureSelectionInEditor();
      const selection = window.getSelection();
      if (!selection.rangeCount || selection.isCollapsed) return;

      const range = selection.getRangeAt(0);
      const parentMark = selection.anchorNode.parentNode.closest('mark.notion-highlight');

      if (parentMark) {
        const text = document.createTextNode(parentMark.textContent);
        parentMark.replaceWith(text);
      } else {
        const mark = document.createElement('mark');
        mark.className = 'notion-highlight';
        range.surroundContents(mark);
      }
      updateURL();
    }

    function insertTodo(remainingText = '', targetContainer = null) {
      if (!targetContainer) ensureSelectionInEditor();
      const selection = window.getSelection();
      if (!selection.rangeCount && !targetContainer) return;

      const todoDiv = document.createElement('div');
      todoDiv.className = 'todo-item';
      todoDiv.innerHTML = `<input type="checkbox" class="todo-checkbox" contenteditable="false"><span class="todo-text">${remainingText || '<br>'}</span>`;

      if (targetContainer) {
        targetContainer.after(todoDiv);
      } else {
        const range = selection.getRangeAt(0);
        const ctx = getEditingContext(range.startContainer);
        if (ctx.type === 'title') return;

        if (ctx.el) {
          ctx.el.replaceWith(todoDiv);
        } else {
          range.deleteContents();
          let node = range.startContainer;
          if (node.nodeType === 3) node = node.parentNode;
          if (node === editor) editor.innerHTML = '';
          editor.appendChild(todoDiv);
        }
      }

      const textSpan = todoDiv.querySelector('.todo-text');
      setFocusAtEnd(textSpan);
      updateURL();
    }

    function setFocusAtEnd(el) {
      const selection = window.getSelection();
      const range = document.createRange();
      range.selectNodeContents(el);
      range.collapse(false);
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function cleanSlashText() {
      const selection = window.getSelection();
      if (!selection.rangeCount) return;
      const range = selection.getRangeAt(0);
      let node = range.startContainer;
      if (node.nodeType === 3 && node.textContent.includes('/')) {
        node.textContent = node.textContent.replace('/', '');
      }
    }

    function executeCommand(cmd) {
      ensureSelectionInEditor();
      cleanSlashText();

      // Se è un comando inline (bold, italic, strike, highlight), usa la
      // selezione esatta dell'utente: funziona identico ovunque, anche
      // dentro al titolo di un toggle o in una to-do.
      if (['bold', 'italic', 'strike', 'highlight'].includes(cmd)) {
        if (cmd === 'bold') { document.execCommand('bold'); updateURL(); }
        else if (cmd === 'italic') { document.execCommand('italic'); updateURL(); }
        else if (cmd === 'strike') { document.execCommand('strikeThrough'); updateURL(); }
        else if (cmd === 'highlight') toggleHighlight();
      } else {
        // Comando di "blocco": recuperiamo il contesto (blocco normale o
        // titolo di un toggle) e il testo che deve essere preservato.
        const selection = window.getSelection();
        let currentText = '';
        let ctx = { type: 'block', el: null };

        if (selection.rangeCount) {
          ctx = getEditingContext(selection.getRangeAt(0).startContainer);
          if (ctx.el) currentText = ctx.el.textContent;
        }

        if (ctx.type === 'title') {
          // Dentro al titolo di un toggle: solo gli heading (e "Text" per
          // resettare) hanno senso, restano testo del titolo e non lo
          // trasformano in un blocco separato.
          if (['p', 'h1', 'h2', 'h3'].includes(cmd)) {
            setToggleTitleStyle(ctx.el, cmd);
          }
          // bullet/number/todo/toggle/quote/hr dentro al titolo: ignorati,
          // vanno applicati dentro al corpo del toggle, non sul titolo.
        } else {
          if (cmd === 'p') formatLineBlock('div', currentText);
          else if (cmd === 'h1') formatLineBlock('h1', currentText);
          else if (cmd === 'h2') formatLineBlock('h2', currentText);
          else if (cmd === 'h3') formatLineBlock('h3', currentText);
          else if (cmd === 'toggle') insertToggleBlock(currentText);
          else if (cmd === 'bullet') formatLineBlock('ul', currentText);
          else if (cmd === 'number') formatLineBlock('ol', currentText);
          else if (cmd === 'todo') insertTodo(currentText);
          else if (cmd === 'quote') formatLineBlock('blockquote', currentText);
          else if (cmd === 'hr') insertDivider();
          else if (cmd === 'menu') showMenuAtCaret();
        }
      }

      hideMenu();
    }

    function updateMenuSelection() {
      menuButtons.forEach((btn, idx) => {
        if (idx === selectedIndex) {
          btn.classList.add('selected');
          btn.scrollIntoView({ block: 'nearest' });
        } else {
          btn.classList.remove('selected');
        }
      });
    }

    function showMenuAtCaret(customTop, customLeft) {
      // Salva la selezione corrente non appena si apre il menu contestuale
      const sel = window.getSelection();
      if (sel.rangeCount > 0) {
        savedRange = sel.getRangeAt(0);
      }

      if (customTop !== undefined && customLeft !== undefined) {
        commandMenu.style.top = `${customTop}px`;
        commandMenu.style.left = `${customLeft}px`;
        commandMenu.style.display = 'block';
      } else {
        const selection = window.getSelection();
        if (!selection.rangeCount) return;
        const range = selection.getRangeAt(0);
        const rect = range.getBoundingClientRect();

        let top = rect.bottom + window.scrollY + 6;
        let left = rect.left + window.scrollX;

        if (window.innerWidth <= 768) {
          commandMenu.style.display = 'block';
        } else {
          if (rect.width === 0 && rect.height === 0) {
            top = window.innerHeight / 3;
            left = window.innerWidth / 2 - 140;
          }
          commandMenu.style.top = `${top}px`;
          commandMenu.style.left = `${left}px`;
          commandMenu.style.display = 'block';
        }
      }

      menuButtons = Array.from(commandMenu.querySelectorAll('button[data-cmd]'));
      selectedIndex = 0;
      updateMenuSelection();
    }

    function hideMenu() { commandMenu.style.display = 'none'; }
    function isMenuVisible() { return commandMenu.style.display === 'block'; }

    editor.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      showMenuAtCaret(e.clientY + window.scrollY, e.clientX + window.scrollX);
    });

    editor.addEventListener('input', (e) => {
      const selection = window.getSelection();
      if (!selection.rangeCount) return;
      const node = selection.getRangeAt(0).startContainer;
      const text = node.textContent || '';
      
      if (text.endsWith('/')) {
        showMenuAtCaret();
      }
      updateURL();
    });

    editor.addEventListener('keydown', (e) => {
      if (isMenuVisible()) {
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          if (selectedIndex < menuButtons.length - 1) {
            selectedIndex++;
            updateMenuSelection();
          }
          return;
        }
        if (e.key === 'ArrowUp') {
          e.preventDefault();
          if (selectedIndex > 0) {
            selectedIndex--;
            updateMenuSelection();
          }
          return;
        }
        if (e.key === 'Enter') {
          e.preventDefault();
          if (menuButtons[selectedIndex]) {
            const cmd = menuButtons[selectedIndex].getAttribute('data-cmd');
            executeCommand(cmd);
          }
          return;
        }
        if (e.key === 'Escape') {
          e.preventDefault();
          hideMenu();
          return;
        }
      }

      const selection = window.getSelection();
      if (!selection.rangeCount) return;
      const range = selection.getRangeAt(0);
      const node = range.startContainer;
      const text = node.textContent || '';
      const caretPos = range.startOffset;
      const lineText = text.slice(0, caretPos);

      // Dentro al titolo di un toggle solo le scorciatoie di heading hanno
      // senso (applicano uno stile al titolo stesso). Le altre (liste,
      // to-do, citazioni, nuovo toggle...) restano disattivate lì dentro:
      // vanno usate nel corpo del toggle, non sul titolo.
      const ctxForShortcuts = getEditingContext(node);

      if (e.key === ' ' && ctxForShortcuts.type === 'title') {
        if (lineText === '#' || lineText === '##' || lineText === '###') {
          e.preventDefault();
          node.textContent = text.slice(caretPos); // rimuove i cancelletti digitati
          const level = lineText.length === 1 ? 'h1' : lineText.length === 2 ? 'h2' : 'h3';
          setToggleTitleStyle(ctxForShortcuts.el, level);
        }
        return;
      }

      if (e.key === ' ' && ctxForShortcuts.type !== 'title') {
        if (lineText === '#') { e.preventDefault(); formatLineBlock('h1', text.slice(caretPos)); return; }
        if (lineText === '##') { e.preventDefault(); formatLineBlock('h2', text.slice(caretPos)); return; }
        if (lineText === '###') { e.preventDefault(); formatLineBlock('h3', text.slice(caretPos)); return; }
        if (lineText === '>') { e.preventDefault(); insertToggleBlock(text.slice(caretPos)); return; }
        if (lineText === '"') { e.preventDefault(); formatLineBlock('blockquote', text.slice(caretPos)); return; }
        if (lineText === '-' || lineText === '*') { e.preventDefault(); formatLineBlock('ul', text.slice(caretPos)); return; }
        if (lineText === '1.') { e.preventDefault(); formatLineBlock('ol', text.slice(caretPos)); return; }
        if (lineText === '[]') { e.preventDefault(); insertTodo(text.slice(caretPos)); return; }
      }

      // "---" o "***" seguito da Invio -> linea divisoria (non ha senso
      // dentro al titolo di un toggle).
      if (e.key === 'Enter' && ctxForShortcuts.type !== 'title') {
        const fullLine = text.trim();
        if (fullLine === '---' || fullLine === '***') {
          e.preventDefault();
          node.textContent = '';
          insertDivider();
          return;
        }
      }

      let parentBlock = node.nodeType === 1 ? node : node.parentNode;

      if (e.key === 'Enter') {
        const toggleDetails = parentBlock ? parentBlock.closest('details.notion-toggle') : null;

        if (toggleDetails) {
          const toggleTitle = parentBlock.closest('.notion-toggle-title');
          const toggleBody = toggleDetails.querySelector('.notion-toggle-body');

          if (toggleTitle) {
            e.preventDefault();
            let firstChild = toggleBody.firstElementChild;
            if (!firstChild) {
              firstChild = document.createElement('div');
              firstChild.innerHTML = '<br>';
              toggleBody.appendChild(firstChild);
            }
            setFocusAtEnd(firstChild);
            updateURL();
            return;
          }

          const activeLine = parentBlock.closest('.notion-toggle-body > *') || parentBlock;
          const isTextEmpty = activeLine.textContent.replace(/\u200B/g, '').trim() === '';

          if (isTextEmpty) {
            e.preventDefault();

            if (toggleBody.children.length > 1) {
              activeLine.remove();
            }

            const newParagraph = document.createElement('div');
            newParagraph.innerHTML = '<br>';
            toggleDetails.after(newParagraph);

            setFocusAtEnd(newParagraph);
            updateURL();
            return;
          }
        }

        const currentTodo = parentBlock ? parentBlock.closest('.todo-item') : null;
        if (currentTodo) {
          e.preventDefault();
          const todoText = currentTodo.querySelector('.todo-text');
          const textContent = todoText ? todoText.textContent.trim() : '';

          if (textContent === '') {
            const emptyDiv = document.createElement('div');
            emptyDiv.innerHTML = '<br>';
            currentTodo.after(emptyDiv);
            currentTodo.remove();
            setFocusAtEnd(emptyDiv);
          } else {
            insertTodo('', currentTodo);
          }
          updateURL();
          return;
        }
      }
    });

    document.addEventListener('click', (e) => {
      if (!commandMenu.contains(e.target) && !e.target.closest('.mobile-toolbar')) {
        hideMenu();
      }
      if (!emojiPicker.contains(e.target) && e.target !== emojiBtn) {
        emojiPicker.style.display = 'none';
      }
    });

    document.querySelectorAll('[data-cmd]').forEach(btn => {
      btn.addEventListener('mousedown', (e) => e.preventDefault());
      btn.addEventListener('click', (e) => {
        const cmd = e.currentTarget.getAttribute('data-cmd');
        executeCommand(cmd);
      });
    });

    editor.addEventListener('change', (e) => {
      if (e.target.classList.contains('todo-checkbox')) {
        const todoItem = e.target.closest('.todo-item');
        if (e.target.checked) {
          todoItem.classList.add('completed');
          e.target.setAttribute('checked', 'checked');
        } else {
          todoItem.classList.remove('completed');
          e.target.removeAttribute('checked');
        }
        updateURL();
      }
    });

    function copyLinkHandler(btnElement) {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const origText = btnElement.textContent;
        btnElement.textContent = '✅ Copied!';
        setTimeout(() => btnElement.textContent = origText, 1500);
      });
    }

    document.getElementById('btn-copy').addEventListener('click', (e) => copyLinkHandler(e.target));
    document.getElementById('btn-copy-mobile').addEventListener('click', (e) => copyLinkHandler(e.target));

    document.getElementById('btn-new').addEventListener('click', () => {
      window.open(window.location.pathname, '_blank');
    });

    function loadFromURL() {
      const hash = window.location.hash.substring(1);
      if (hash) {
        try {
          const decoded = decodeURIComponent(escape(atob(hash)));
          const data = JSON.parse(decoded);
          titleInput.value = data.t || 'Note';
          editor.innerHTML = data.b || '<div><br></div>';
          if (data.e) setFavicon(data.e);

          document.title = data.t || 'Note';

          editor.querySelectorAll('.todo-checkbox').forEach(cb => {
            if (cb.hasAttribute('checked')) { cb.checked = true; }
          });
        } catch (e) {
          try {
            editor.innerHTML = decodeURIComponent(escape(atob(hash)));
          } catch(err) {
            editor.innerText = decodeURIComponent(hash);
          }
        }
      }
      updatePlaceholder();
    }

    function updatePlaceholder() {
      const onlyEmptyLine = editor.children.length === 1
        && editor.children[0].tagName === 'DIV'
        && editor.textContent.trim() === '';
      editor.classList.toggle('is-empty', onlyEmptyLine);
    }

    function updateURL() {
      const titleText = titleInput.value;
      const bodyHTML = editor.innerHTML;
      document.title = titleText || 'Note';
      updatePlaceholder();

      if (bodyHTML || (titleText && titleText !== 'Note') || currentEmoji !== '✏️') {
        const payload = JSON.stringify({ t: titleText, b: bodyHTML, e: currentEmoji });
        const encoded = btoa(unescape(encodeURIComponent(payload)));
        history.replaceState(null, null, '#' + encoded);
      } else {
        history.replaceState(null, null, window.location.pathname);
      }
    }

    titleInput.addEventListener('input', updateURL);
    loadFromURL();
  </script>
</body>
</html>
