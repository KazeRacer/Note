<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Note</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✏️</text></svg>">
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      max-width: 900px; 
      margin: 20px auto; 
      padding: 0 15px; 
      color: #222; 
    }
    .title-input { 
      font-size: 26px; 
      font-weight: bold; 
      border: none; 
      outline: none; 
      width: 100%; 
      margin-bottom: 15px; 
      padding: 4px 0;
      color: #111;
      font-family: inherit;
      background: transparent;
    }
    .title-input::placeholder {
      color: #aaa;
    }
    textarea { 
      width: 100%; 
      height: 70vh; 
      padding: 16px; 
      font-size: 18px; 
      border: 1px solid #ccc; 
      border-radius: 8px; 
      box-sizing: border-box; 
      line-height: 1.6; 
      font-family: inherit; 
      resize: vertical;
    }
  </style>
</head>
<body>
  <input type="text" id="title" class="title-input" placeholder="Titolo nota..." value="Note">
  <textarea id="editor" placeholder="Scrivi qui..."></textarea>

  <script>
    const titleInput = document.getElementById('title');
    const editor = document.getElementById('editor');

    // 1. Carica titolo e testo dall'URL
    function loadFromURL() {
      const hash = window.location.hash.substring(1);
      if (hash) {
        try {
          const decoded = decodeURIComponent(escape(atob(hash)));
          const data = JSON.parse(decoded);
          titleInput.value = data.t || 'Note';
          editor.value = data.b || '';
          document.title = data.t || 'Note';
        } catch (e) {
          // Fallback per vecchi URL con solo testo grezzo
          try {
            editor.value = decodeURIComponent(escape(atob(hash)));
          } catch(err) {
            editor.value = decodeURIComponent(hash);
          }
        }
      }
    }

    // 2. Salva titolo e testo nell'URL in tempo reale
    function updateURL() {
      const titleText = titleInput.value;
      const bodyText = editor.value;

      document.title = titleText || 'Note';

      if (bodyText || (titleText && titleText !== 'Note')) {
        const payload = JSON.stringify({ t: titleText, b: bodyText });
        const encoded = btoa(unescape(encodeURIComponent(payload)));
        history.replaceState(null, null, '#' + encoded);
      } else {
        history.replaceState(null, null, window.location.pathname);
      }
    }

    titleInput.addEventListener('input', updateURL);
    editor.addEventListener('input', updateURL);

    loadFromURL();
  </script>
</body>
</html>
